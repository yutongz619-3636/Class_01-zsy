{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1 class="card-title">用户登录</h1>

    {% if error %}
    <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
        <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <p class="security-tip">连续输错 5 次将暂时锁定 60 秒。</p>
        <button class="btn btn-block" type="submit">登 录</button>
    </form>
</div>
{% endblock %}
